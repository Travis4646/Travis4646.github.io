<html lang="zh-CN">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    :root {
      --bg-deep: #1a1410;
      --bg-card: rgba(255, 248, 240, 0.06);
      --bg-card-hover: rgba(255, 248, 240, 0.1);
      --gold: #d4a853;
      --gold-light: #f0d78c;
      --cinnabar: #c45c48;
      --ink: #f5efe6;
      --ink-muted: rgba(245, 239, 230, 0.55);
      --border: rgba(212, 168, 83, 0.25);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Serif SC", "Songti SC", serif;
      background: var(--bg-deep);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:

        radial-gradient(ellipse 60% 40% at 100% 50%, rgba(212, 168, 83, 0.08), transparent),
        radial-gradient(ellipse 50% 30% at 0% 80%, rgba(196, 92, 72, 0.06), transparent);
    }

    .bg-pattern::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30Z' fill='none' stroke='%23d4a853' stroke-width='0.5'/%3E%3C/svg%3E");
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .seal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border: 2px solid var(--cinnabar);
      color: var(--cinnabar);
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      font-size: 28px;
      margin-bottom: 20px;
      transform: rotate(-3deg);
      box-shadow: inset 0 0 0 3px rgba(196, 92, 72, 0.2);
    }

    h1 {
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--ink-muted);
      font-size: 0.95rem;
      letter-spacing: 0.15em;
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      margin-bottom: 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--ink);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.15);
    }

    .field select option { background: #2a2218; }

    .style-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .tag {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--ink-muted);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover { border-color: var(--gold); color: var(--ink); }

    .tag.active {
      background: rgba(212, 168, 83, 0.15);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
      justify-content: center;
    }

    .btn {
      padding: 14px 36px;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 1rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, var(--cinnabar), #a84838);
      color: #fff;
      box-shadow: 0 8px 32px rgba(196, 92, 72, 0.35);
    }

    .btn-primary:hover {
      box-shadow: 0 12px 40px rgba(196, 92, 72, 0.45);
    }

    .btn-secondary {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--bg-card-hover); }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .results-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.15em;
    }

    .results-header span { color: var(--ink-muted); font-size: 0.85rem; }

    .results-grid {
      display: grid;
      gap: 16px;
    }

    .name-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: background 0.2s, border-color 0.2s;
      animation: fadeIn 0.4s ease backwards;
    }

    .name-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(212, 168, 83, 0.4);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .name-display {
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      font-size: 2.25rem;
      color: var(--ink);
      letter-spacing: 0.15em;
      min-width: 120px;
    }

    .name-meta .pinyin {
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .name-meta .meaning {
      font-size: 0.95rem;
      color: var(--ink-muted);
      line-height: 1.7;
    }

    .name-meta .chars-detail {
      margin-top: 8px;
      font-size: 0.8rem;
      color: rgba(245, 239, 230, 0.4);
    }

    .card-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .icon-btn.favorited { color: var(--cinnabar); border-color: var(--cinnabar); }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--ink-muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }

    .favorites-section { margin-top: 40px; }

    .favorites-section h2 {
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      margin-bottom: 16px;
    }

    .fav-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .fav-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(196, 92, 72, 0.12);
      border: 1px solid rgba(196, 92, 72, 0.3);
      border-radius: 999px;
      font-size: 0.95rem;
    }

    .fav-chip button {
      background: none;
      border: none;
      color: var(--ink-muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 2px;
    }

    .fav-chip button:hover { color: var(--cinnabar); }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(26, 20, 16, 0.95);
      border: 1px solid var(--gold);
      color: var(--gold-light);
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    footer {
      text-align: center;
      margin-top: 48px;
      color: var(--ink-muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    @media (max-width: 600px) {
      .name-card {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .card-actions { flex-direction: row; justify-content: center; }
      .name-display { min-width: auto; }
    }
  </style>
</head>

    </section>

          { c: "安", p: "ān", m: "平安顺遂，一生无忧" },
          { c: "宁", p: "níng", m: "宁静致远，心境平和" },
          { c: "瑞", p: "ruì", m: "祥瑞吉兆，福运绵长" },
          { c: "嘉", p: "jiā", m: "嘉言懿行，美好品德" },
          { c: "乐", p: "lè", m: "快乐幸福，性格开朗" },
        ],
        modern: [
          { c: "一", p: "yī", m: "专一纯粹，初心不改" },
          { c: "凡", p: "fán", m: "平凡中见伟大" },
          { c: "之", p: "zhī", m: "文雅含蓄，书卷气息" },
          { c: "也", p: "yě", m: "洒脱自然，不拘一格" },
        ],
        poetic: [
          { c: "予", p: "yǔ", m: "赐予美好，慷慨大方" },
          { c: "初", p: "chū", m: "初心不改，纯真美好" },
          { c: "念", p: "niàn", m: "念念不忘，深情厚谊" },
        ],
        bold: [
          { c: "卓", p: "zhuó", m: "卓越非凡，出类拔萃" },
          { c: "越", p: "yuè", m: "超越自我，勇往直前" },
        ],
        gentle: [
          { c: "和", p: "hé", m: "和睦友善，温润如玉" },
          { c: "暖", p: "nuǎn", m: "温暖如春，心地善良" },
        ],
      },
    };

    const COMBOS = [
      { chars: ["子", "墨"], pinyin: "zǐ mò", meaning: "君子之风，翰墨飘香，文采斐然" },
      { chars: ["景", "行"], pinyin: "jǐng xíng", meaning: "高山仰止，景行行止，品德高尚" },
      { chars: ["知", "秋"], pinyin: "zhī qiū", meaning: "一叶知秋，聪慧敏锐，洞察入微" },
      { chars: ["望", "舒"], pinyin: "wàng shū", meaning: "望舒驾月，光明美好，前程似锦" },
      { chars: ["清", "和"], pinyin: "qīng hé", meaning: "清气长和，心境平和，品格清雅" },
      { chars: ["云", "舒"], pinyin: "yún shū", meaning: "云卷云舒，自在洒脱，心胸开阔" },
      { chars: ["明", "哲"], pinyin: "míng zhé", meaning: "明哲保身，智慧通达，深明大义" },
      { chars: ["思", "齐"], pinyin: "sī qí", meaning: "见贤思齐，向上向善，追求卓越" },
      { chars: ["若", "水"], pinyin: "ruò shuǐ", meaning: "上善若水，厚德载物，柔而不弱" },
      { chars: ["怀", "瑾"], pinyin: "huái jǐn", meaning: "怀瑾握瑜，品德高洁，才德兼备" },
      { chars: ["语", "嫣"], pinyin: "yǔ yān", meaning: "笑语嫣然，美丽动人，活泼开朗" },
      { chars: ["雨", "桐"], pinyin: "yǔ tóng", meaning: "雨润梧桐，清新自然，生机盎然" },
      { chars: ["书", "瑶"], pinyin: "shū yáo", meaning: "书香门第，美玉无瑕，才情并茂" },
      { chars: ["念", "慈"], pinyin: "niàn cí", meaning: "心怀慈悲，善良温柔，福泽深厚" },
      { chars: ["君", "泽"], pinyin: "jūn zé", meaning: "君子之泽，恩泽绵长，品德高尚" },
    ];

    let currentStyle = "classic";
    let favorites = JSON.parse(localStorage.getItem("nameFavorites") || "[]");

    const styleTags = document.getElementById("styleTags");
    const generateBtn = document.getElementById("generateBtn");
    const resultsGrid = document.getElementById("resultsGrid");
    const resultHint = document.getElementById("resultHint");
    const favList = document.getElementById("favList");
    const favoritesSection = document.getElementById("favoritesSection");
    const toast = document.getElementById("toast");

    styleTags.addEventListener("click", (e) => {
      const tag = e.target.closest(".tag");
      if (!tag) return;
      styleTags.querySelectorAll(".tag").forEach((t) => t.classList.remove("active"));
      tag.classList.add("active");
      currentStyle = tag.dataset.style;
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickUnique(pool, n, used) {
      const available = pool.filter((c) => !used.has(c.c));
      const shuffled = shuffle(available.length >= n ? available : pool);
      const picked = [];
      for (const item of shuffled) {
        if (picked.length >= n) break;
        if (!used.has(item.c) || picked.length === 0) {
          picked.push(item);
          used.add(item.c);
        }
      }
      return picked;
    }

    function getCharPool(gender, style) {
      const g = gender === "neutral" ? "neutral" : gender;
      const base = CHARS[g]?.[style] || CHARS[g]?.classic || [];
      const fallback = CHARS[g]?.modern || CHARS.neutral.classic;
      return base.length ? base : fallback;
    }

    function generateName(surname, gender, style, nameLength) {
      const pool = getCharPool(gender, style);

      if (nameLength === 1) {
        const [ch] = pickUnique(pool, 1, new Set());
        return {
          full: surname + ch.c,
          pinyin: ch.p,
          meaning: ch.m,
          detail: `${ch.c}：${ch.m}`,
        };
      }

      if (Math.random() < 0.25 && gender !== "neutral") {
        const combo = COMBOS[Math.floor(Math.random() * COMBOS.length)];
        return {
          full: surname + combo.chars.join(""),
          pinyin: combo.pinyin,
          meaning: combo.meaning,
          detail: combo.chars.map((c, i) => `${c}：${combo.meaning.split("，")[i] || "寓意美好"}`).join(" · "),
        };
      }

      const used = new Set();
      const chars = pickUnique(pool, 2, used);
      if (chars.length < 2) {
        const [a, b] = shuffle(pool).slice(0, 2);
        chars.push(a, b);
      }

      return {
        full: surname + chars.map((c) => c.c).join(""),
        pinyin: chars.map((c) => c.p).join(" "),
        meaning: chars.map((c) => c.m).join("；"),
        detail: chars.map((c) => `${c.c}：${c.m}`).join(" · "),
      };
    }

    function generateAll() {
      const surname = document.getElementById("surname").value.trim();
      if (!surname) {
        showToast("请输入姓氏");
        document.getElementById("surname").focus();
        return;
      }

      const gender = document.getElementById("gender").value;
      const nameLength = parseInt(document.getElementById("length").value, 10);
      const count = parseInt(document.getElementById("count").value, 10);

      const names = [];
      const seen = new Set();
      let attempts = 0;

      while (names.length < count && attempts < count * 20) {
        attempts++;
        const name = generateName(surname, gender, currentStyle, nameLength);
        if (!seen.has(name.full)) {
          seen.add(name.full);
          names.push(name);
        }
      }

      renderResults(names);
      resultHint.textContent = `共生成 ${names.length} 个名字 · ${getStyleLabel(currentStyle)}风格`;
    }

    function getStyleLabel(style) {
      const labels = {
        classic: "古典雅致",
        modern: "现代简约",
        poetic: "诗意文艺",
        bold: "大气",
        gentle: "温婉",
      };
      return labels[style] || "";
    }

    function renderResults(names) {
      resultsGrid.innerHTML = names
        .map(
          (name, i) => `
        <article class="name-card" style="animation-delay: ${i * 0.06}s" data-name="${name.full}">
          <div class="name-display">${name.full}</div>
          <div class="name-meta">
            <div class="pinyin">${name.pinyin}</div>
            <div class="meaning">${name.meaning}</div>
            <div class="chars-detail">${name.detail}</div>
          </div>
          <div class="card-actions">
            <button class="icon-btn copy-btn" title="复制">📋</button>
            <button class="icon-btn fav-btn" title="收藏">♡</button>
          </div>
        </article>
      `
        )
        .join("");

      resultsGrid.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const card = btn.closest(".name-card");
          const name = card.dataset.name;
          const meta = card.querySelector(".meaning").textContent;
          navigator.clipboard.writeText(`${name} — ${meta}`).then(() => showToast("已复制到剪贴板"));
        });
      });

      resultsGrid.querySelectorAll(".fav-btn").forEach((btn) => {
        const card = btn.closest(".name-card");
        const name = card.dataset.name;
        if (favorites.includes(name)) {
          btn.classList.add("favorited");
          btn.textContent = "♥";
        }
        btn.addEventListener("click", () => toggleFavorite(name, btn));
      });
    }

    function toggleFavorite(name, btn) {
      const idx = favorites.indexOf(name);
      if (idx >= 0) {
        favorites.splice(idx, 1);
        btn.classList.remove("favorited");
        btn.textContent = "♡";
        showToast("已取消收藏");
      } else {
        favorites.push(name);
        btn.classList.add("favorited");
        btn.textContent = "♥";
        showToast("已加入收藏");
      }
      localStorage.setItem("nameFavorites", JSON.stringify(favorites));
      renderFavorites();
    }

    function renderFavorites() {
      if (favorites.length === 0) {
        favoritesSection.hidden = true;
        return;
      }
      favoritesSection.hidden = false;
      favList.innerHTML = favorites
        .map(
          (name) => `
        <span class="fav-chip">
          ${name}
          <button type="button" data-remove="${name}" aria-label="移除">×</button>
        </span>
      `
        )
        .join("");

      favList.querySelectorAll("[data-remove]").forEach((btn) => {
        btn.addEventListener("click", () => {
          favorites = favorites.filter((n) => n !== btn.dataset.remove);
          localStorage.setItem("nameFavorites", JSON.stringify(favorites));
          renderFavorites();
          document.querySelectorAll(".name-card").forEach((card) => {
            if (card.dataset.name === btn.dataset.remove) {
              const favBtn = card.querySelector(".fav-btn");
              favBtn.classList.remove("favorited");
              favBtn.textContent = "♡";
            }
          });
        });
      });
    }

    generateBtn.addEventListener("click", generateAll);
    document.getElementById("clearFavBtn").addEventListener("click", () => {
      favorites = [];
      localStorage.removeItem("nameFavorites");
      renderFavorites();
      document.querySelectorAll(".fav-btn").forEach((btn) => {
        btn.classList.remove("favorited");
        btn.textContent = "♡";
      });
      showToast("收藏已清空");
    });

    renderFavorites();
  </script>
</body>
</html>
